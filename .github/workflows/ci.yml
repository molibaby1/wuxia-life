name: CI

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - ralph/project-stabilization-engineering-recovery

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Event quality gate
        run: npm run validate:event-quality

      - name: Stability gate
        run: npm run stability
